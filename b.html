<html>
    <head>
    
        <meta charset="utf-8">
    
        <meta name="viewport" content="width=device-width, initial-scale=1">
    
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
        <title>Full width container</title>
    
    </head>
    
    <body>
        <!--
        p:padding
        m:margin
        max level:5
    
        suffix:
        x:sets both left and right
        y:sets both top and bottom
        t:top
        b:bottom
        l:left
        r:right
        blank:from all sides
        -->

        <div class="container border-2 bg-warning text-info pd-4 my-4">
            <h1>Coding</h1>
            <p>Making kids fall in love with coding</p>
        </div>

        <div class="container border-5 bg-info text-secondary pd-2 my-2">
            <h1>Coding</h1>
            <p>Making kids fall in love with coding</p>
        </div>

    </body>
</html>
